name: 🚀 Auto-Deploy PlanetHoster - Match My Formation

on:
  push:
    branches: [prod_hoster]
  pull_request:
    branches: [prod_hoster]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  PLANETHOSTER_DOMAIN: ${{ secrets.PLANETHOSTER_DOMAIN }}
  PLANETHOSTER_HOST: ${{ secrets.PLANETHOSTER_HOST }}
  PLANETHOSTER_USER: ${{ secrets.PLANETHOSTER_USER }}
  PLANETHOSTER_PASSWORD: ${{ secrets.PLANETHOSTER_PASSWORD }}
  PLANETHOSTER_PORT: ${{ secrets.PLANETHOSTER_PORT || '22' }}
  PLANETHOSTER_PATH: ${{ secrets.PLANETHOSTER_PATH }}
  
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  # Job de validation et build
  build-and-validate:
    name: 🔨 Build & Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: 🟢 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, mysql, bcmath, curl, zip, gd, dom, fileinfo
        tools: composer:v2
        coverage: none
    
    - name: 📦 Install Dependencies (Frontend)
      run: |
        cd frontend
        npm ci --silent
    
    - name: 📦 Install Dependencies (Backend)
      run: |
        cd backend
        composer install --no-dev --optimize-autoloader --no-interaction
    
    - name: 🔨 Build Frontend
      run: |
        cd frontend
        cp env.planethoster .env.local
        npm run build --webpack
    
    - name: 🔍 Validate Build
      run: |
        cd frontend
        if [ ! -d ".next" ]; then
          echo "❌ Build frontend failed"
          exit 1
        fi
        echo "✅ Frontend build validated"
    
    - name: 🔍 Validate Backend
      run: |
        cd backend
        php artisan config:cache
        php artisan route:cache
        echo "✅ Backend validated"
    
    - name: 📊 Generate Build Report
      run: |
        echo "## 🚀 Build Report - $(date)" >> build-report.md
        echo "" >> build-report.md
        echo "### 📁 Build Information" >> build-report.md
        echo "- **Branch**: ${{ github.ref_name }}" >> build-report.md
        echo "- **Commit**: ${{ github.sha }}" >> build-report.md
        echo "- **Domain**: ${{ env.PLANETHOSTER_DOMAIN }}" >> build-report.md
        echo "- **Environment**: ${{ github.event.inputs.deploy_environment || 'production' }}" >> build-report.md
        echo "" >> build-report.md
        echo "### 📦 Build Stats" >> build-report.md
        echo "- **Frontend Size**: $(du -sh frontend/.next | cut -f1)" >> build-report.md
        echo "- **Backend Size**: $(du -sh backend | cut -f1)" >> build-report.md
        echo "- **Total Files**: $(find . -type f | wc -l)" >> build-report.md
        echo "" >> build-report.md
        echo "### ✅ Validation Status" >> build-report.md
        echo "- **Frontend Build**: ✅ Passed" >> build-report.md
        echo "- **Backend Validation**: ✅ Passed" >> build-report.md
        echo "- **Dependencies**: ✅ Installed" >> build-report.md
    
    - name: 📤 Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          frontend/.next/
          backend/
          database-complete.sql
          build-report.md
        retention-days: 30

  # Job de déploiement
  deploy:
    name: 🚀 Deploy to PlanetHoster
    runs-on: ubuntu-latest
    needs: build-and-validate
    if: github.ref == 'refs/heads/prod_hoster' && github.event_name == 'push'
    
    steps:
    - name: 📥 Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: ./build
    
    - name: 🔧 Configure Environment
      run: |
        cd build/backend
        
        # Configuration backend
        cp env.planethoster .env
        sed -i "s|votre-domaine.planethoster.net|${{ env.PLANETHOSTER_DOMAIN }}|g" .env
        sed -i "s|votre_bdd_planethoster|${{ env.DB_NAME }}|g" .env
        sed -i "s|votre_user_planethoster|${{ env.DB_USER }}|g" .env
        sed -i "s|votre_mdp_planethoster|${{ env.DB_PASSWORD }}|g" .env
        
        # Finalisation Laravel
        php artisan key:generate --force
        php artisan storage:link
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache
        
        # Configuration frontend
        cd ../frontend
        cp env.planethoster .env.local
        sed -i "s|votre-domaine.planethoster.net|${{ env.PLANETHOSTER_DOMAIN }}|g" .env.local
    
    - name: 📤 Deploy to PlanetHoster
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ env.PLANETHOSTER_HOST }}
        username: ${{ env.PLANETHOSTER_USER }}
        password: ${{ env.PLANETHOSTER_PASSWORD }}
        port: ${{ env.PLANETHOSTER_PORT }}
        source: |
          build/backend/**
          build/frontend/.next/**
          build/frontend/public/**
          build/database-complete.sql
          !build/backend/node_modules/**
          !build/backend/vendor/**
          !build/frontend/node_modules/**
        target: ${{ env.PLANETHOSTER_PATH }}
        strip_components: 1
        timeout: 300s
    
    - name: 🔧 Setup on Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.PLANETHOSTER_HOST }}
        username: ${{ env.PLANETHOSTER_USER }}
        password: ${{ env.PLANETHOSTER_PASSWORD }}
        port: ${{ env.PLANETHOSTER_PORT }}
        script: |
          cd ${{ env.PLANETHOSTER_PATH }}
          
          # Installation backend
          cd backend
          composer install --no-dev --optimize-autoloader --no-interaction
          
          # Permissions
          chmod -R 755 storage bootstrap/cache
          chmod -R 755 public/storage
          
          # Base de données
          mysql -u ${{ env.DB_USER }} -p${{ env.DB_PASSWORD }} ${{ env.DB_NAME }} < database-complete.sql
          
          # Finalisation
          php artisan cache:clear
          php artisan view:clear
          php artisan route:clear
          php artisan config:clear
          
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          
          # Test
          php artisan about
    
    - name: 📝 Create .htaccess
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.PLANETHOSTER_HOST }}
        username: ${{ env.PLANETHOSTER_USER }}
        password: ${{ env.PLANETHOSTER_PASSWORD }}
        port: ${{ env.PLANETHOSTER_PORT }}
        script: |
          cd ${{ env.PLANETHOSTER_PATH }}
          
          cat > .htaccess << 'EOF'
          # Configuration PlanetHoster pour Match My Formation
          Options -MultiViews
          RewriteEngine On
          
          # Forcer HTTPS
          RewriteCond %{HTTPS} off
          RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
          
          # Redirection vers frontend
          RewriteCond %{REQUEST_URI} !^/api/
          RewriteCond %{REQUEST_URI} !^/storage/
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^(.*)$ /index.html [L,QSA]
          
          # API Laravel
          RewriteCond %{REQUEST_URI} ^/api/
          RewriteRule ^api/(.*)$ backend/public/index.php/$1 [L]
          
          # Headers de sécurité
          <IfModule mod_headers.c>
            Header always set X-Content-Type-Options nosniff
            Header always set X-Frame-Options DENY
            Header always set X-XSS-Protection "1; mode=block"
            Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;"
          </IfModule>
          
          # Compression
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/plain text/html text/xml text/css application/javascript application/json
          </IfModule>
          
          # Cache
          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/jpg "access plus 1 year"
            ExpiresByType image/webp "access plus 1 year"
          </IfModule>
          EOF
    
    - name: 🧪 Test Deployment
      run: |
        echo "🧪 Testing deployment..."
        
        # Test de l'URL principale
        if curl -f -s -I "https://${{ env.PLANETHOSTER_DOMAIN }}" > /dev/null; then
          echo "✅ Main URL is accessible"
        else
          echo "❌ Main URL is not accessible"
          exit 1
        fi
        
        # Test de l'API
        if curl -f -s -I "https://${{ env.PLANETHOSTER_DOMAIN }}/api/health" > /dev/null; then
          echo "✅ API is accessible"
        else
          echo "⚠️ API might not be fully configured yet"
        fi
    
    - name: 📊 Generate Deployment Report
      run: |
        echo "## 🚀 Deployment Report - $(date)" >> deployment-report.md
        echo "" >> deployment-report.md
        echo "### 🌐 Deployment Information" >> deployment-report.md
        echo "- **Domain**: ${{ env.PLANETHOSTER_DOMAIN }}" >> deployment-report.md
        echo "- **Branch**: ${{ github.ref_name }}" >> deployment-report.md
        echo "- **Commit**: ${{ github.sha }}" >> deployment-report.md
        echo "- **Deployed by**: ${{ github.actor }}" >> deployment-report.md
        echo "- **Environment**: Production" >> deployment-report.md
        echo "" >> deployment-report.md
        echo "### ✅ Deployment Status" >> deployment-report.md
        echo "- **Code Transfer**: ✅ Completed" >> deployment-report.md
        echo "- **Backend Setup**: ✅ Completed" >> deployment-report.md
        echo "- **Database Import**: ✅ Completed" >> deployment-report.md
        echo "- **Server Configuration**: ✅ Completed" >> deployment-report.md
        echo "- **URL Tests**: ✅ Passed" >> deployment-report.md
        echo "" >> deployment-report.md
        echo "### 🔗 Access Links" >> deployment-report.md
        echo "- **Main Site**: https://${{ env.PLANETHOSTER_DOMAIN }}" >> deployment-report.md
        echo "- **API**: https://${{ env.PLANETHOSTER_DOMAIN }}/api" >> deployment-report.md
        echo "- **Login**: https://${{ env.PLANETHOSTER_DOMAIN }}/fr/login" >> deployment-report.md
        echo "" >> deployment-report.md
        echo "### 👤 Test Accounts" >> deployment-report.md
        echo "- **Student**: student@match.com / Azerty123!" >> deployment-report.md
        echo "- **Creator**: creator@match.com / Azerty123!" >> deployment-report.md
        echo "- **Admin**: admin@match.com / Azerty123!" >> deployment-report.md
    
    - name: 📤 Upload Deployment Report
      uses: actions/upload-artifact@v4
      with:
        name: deployment-report
        path: deployment-report.md
        retention-days: 90
    
    - name: 🎉 Notify Success
      run: |
        echo "🎉 Deployment completed successfully!"
        echo "🌐 Site available at: https://${{ env.PLANETHOSTER_DOMAIN }}"
        echo "📊 Check deployment-report.md for details"

  # Job de notification
  notify:
    name: 📢 Notify Deployment
    runs-on: ubuntu-latest
    needs: [build-and-validate, deploy]
    if: always()
    
    steps:
    - name: 📢 Send Notification
      run: |
        if [ "${{ needs.deploy.result }}" == "success" ]; then
          echo "✅ Deployment to PlanetHoster completed successfully!"
          echo "🌐 https://${{ env.PLANETHOSTER_DOMAIN }}"
        elif [ "${{ needs.deploy.result }}" == "failure" ]; then
          echo "❌ Deployment failed. Check the logs for details."
        elif [ "${{ needs.deploy.result }}" == "skipped" ]; then
          echo "⏭️ Deployment skipped (not on prod_hoster branch)."
        fi
