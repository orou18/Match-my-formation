services:
  # Service API Backend
  - type: web
    name: match-my-formation-api
    runtime: node
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: match-my-formation-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: match-my-formation-redis
          property: connectionString
      - key: NEXTAUTH_URL
        value: https://match-my-formation.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_API_URL
        value: https://match-my-formation.onrender.com
      - key: NEXT_PUBLIC_FRONTEND_URL
        value: https://match-my-formation.vercel.app

  # Base de données PostgreSQL
  - type: pserv
    name: match-my-formation-db
    plan: free
    ipAllowList: []
    databaseName: matchmyformation

  # Service Redis
  - type: redis
    name: match-my-formation-redis
    plan: free
    ipAllowList: []

# Configuration du domaine
databases:
  - name: match-my-formation-db
    databaseName: matchmyformation
    user: matchmyformation

# Configuration du déploiement automatique
version: "1.0"
webhooks:
  - type: github
    event: push
    branch: main
