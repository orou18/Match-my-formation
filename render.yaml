services:
  # Service API Backend Laravel
  - type: web
    name: match-my-formation-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    buildCommand: "docker build -t laravel-app ."
    startCommand: "php-fpm"
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: MatchMyFormation
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://match-my-formation-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: match-my-formation-db
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        fromDatabase:
          name: match-my-formation-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: match-my-formation-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: match-my-formation-db
          property: password
      - key: CACHE_DRIVER
        value: redis
      - key: REDIS_HOST
        fromService:
          type: redis
          name: match-my-formation-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: match-my-formation-redis
          property: port
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: 120
      - key: FILESYSTEM_DISK
        value: local

  # Base de données PostgreSQL
  - type: pserv
    name: match-my-formation-db
    plan: free
    ipAllowList: []
    databaseName: match_my_formation

  # Service Redis
  - type: redis
    name: match-my-formation-redis
    plan: free
    ipAllowList: []

# Configuration du déploiement automatique
version: "1.0"
webhooks:
  - type: github
    event: push
    branch: main
